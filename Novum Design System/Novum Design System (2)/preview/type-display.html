<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'Century Gothic'; src: url('../fonts/CENTURY GOTHIC_DELGADA.ttf'); font-weight: 300; }
  @font-face { font-family: 'Century Gothic'; src: url('../fonts/CENTURY GOTHIC_REGULAR.ttf'); font-weight: 400; }
  @font-face { font-family: 'Century Gothic'; src: url('../fonts/CENTURY GOTHIC_GRUES.ttf'); font-weight: 700; }
  @font-face { font-family: 'Century Gothic'; src: url('../fonts/CENTURY GOTHIC_ULTRAGURESA.ttf'); font-weight: 900; }
  @font-face { font-family: 'Arlon'; src: url('../fonts/ARLON BLACK.ttf'); font-weight: 900; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Century Gothic', sans-serif; background: #F5F5F2; padding: 24px; }
  .row { margin-bottom: 18px; border-bottom: 1px solid #D0D3D8; padding-bottom: 16px; display: flex; align-items: baseline; gap: 20px; }
  .row:last-child { border-bottom: none; }
  .meta { min-width: 160px; flex-shrink: 0; }
  .meta-role { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #6E7278; font-weight: 700; }
  .meta-spec { font-size: 10px; color: #A8ADB3; margin-top: 3px; font-family: monospace; }
  .specimen { color: #121417; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">
      <div class="meta-role">Display</div>
      <div class="meta-spec">Arlon / 900 / 64px / -0.02em</div>
    </div>
    <div class="specimen" style="font-family:'Arlon',sans-serif;font-weight:900;font-size:52px;line-height:1.1;letter-spacing:-0.02em;">NOVUM</div>
  </div>
  <div class="row">
    <div class="meta">
      <div class="meta-role">H1</div>
      <div class="meta-spec">Arlon / 900 / 48px / -0.02em</div>
    </div>
    <div class="specimen" style="font-family:'Arlon',sans-serif;font-weight:900;font-size:38px;line-height:1.15;letter-spacing:-0.02em;">Modern Authority</div>
  </div>
  <div class="row">
    <div class="meta">
      <div class="meta-role">H2</div>
      <div class="meta-spec">Century Gothic / 700 / 32px</div>
    </div>
    <div class="specimen" style="font-family:'Century Gothic',sans-serif;font-weight:700;font-size:28px;line-height:1.25;">Hub de Edición</div>
  </div>
  <div class="row">
    <div class="meta">
      <div class="meta-role">H3</div>
      <div class="meta-spec">Century Gothic / 700 / 24px</div>
    </div>
    <div class="specimen" style="font-family:'Century Gothic',sans-serif;font-weight:700;font-size:22px;line-height:1.3;">Cola de Guiones</div>
  </div>
  <div class="row">
    <div class="meta">
      <div class="meta-role">H4</div>
      <div class="meta-spec">Century Gothic / 700 / 20px</div>
    </div>
    <div class="specimen" style="font-family:'Century Gothic',sans-serif;font-weight:700;font-size:18px;line-height:1.35;">Perfil de Cliente</div>
  </div>
</body>
</html>
