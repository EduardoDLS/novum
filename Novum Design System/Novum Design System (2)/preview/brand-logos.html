<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'Arlon'; src: url('../fonts/ARLON BLACK.ttf'); font-weight: 900; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #121417; padding: 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .logo-cell { display: flex; align-items: center; justify-content: center; padding: 24px 16px; border-radius: 8px; }
  .logo-cell img { max-width: 100%; max-height: 60px; object-fit: contain; }
  .label { font-family: 'Arlon', sans-serif; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #6E7278; text-align: center; margin-top: 6px; }
  .cell-wrap { }
</style>
</head>
<body>
  <div class="cell-wrap">
    <div class="logo-cell" style="background:#121417;border:1px solid #2A2E33;">
      <img src="../assets/WORDMARK-10.svg" alt="Wordmark light">
    </div>
    <div class="label">Wordmark — sobre negro</div>
  </div>
  <div class="cell-wrap">
    <div class="logo-cell" style="background:#F5F5F2;">
      <img src="../assets/WORDMARK-11.svg" alt="Wordmark dark">
    </div>
    <div class="label">Wordmark — sobre blanco</div>
  </div>
  <div class="cell-wrap">
    <div class="logo-cell" style="background:#121417;border:1px solid #2A2E33;">
      <img src="../assets/WORDMARK-TAGLINE-05.svg" alt="Wordmark + Tagline">
    </div>
    <div class="label">Wordmark + Tagline</div>
  </div>
  <div class="cell-wrap">
    <div class="logo-cell" style="background:#121417;border:1px solid #2A2E33;">
      <img src="../assets/ISOLOGO-15.svg" alt="Isologo 1" style="max-height:50px;">
    </div>
    <div class="label">Isologo — variant A</div>
  </div>
  <div class="cell-wrap">
    <div class="logo-cell" style="background:#F5F5F2;">
      <img src="../assets/ISOLOGO-16.svg" alt="Isologo 2" style="max-height:50px;">
    </div>
    <div class="label">Isologo — variant B</div>
  </div>
  <div class="cell-wrap">
    <div class="logo-cell" style="background:#121417;border:1px solid #2A2E33;">
      <img src="../assets/ISOLOGO-18.svg" alt="Isologo 3" style="max-height:50px;">
    </div>
    <div class="label">Isologo — variant C</div>
  </div>
</body>
</html>
