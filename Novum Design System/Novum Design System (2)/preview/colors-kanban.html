<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'Century Gothic'; src: url('../fonts/CENTURY GOTHIC_REGULAR.ttf'); font-weight: 400; }
  @font-face { font-family: 'Century Gothic'; src: url('../fonts/CENTURY GOTHIC_GRUES.ttf'); font-weight: 700; }
  @font-face { font-family: 'Arlon'; src: url('../fonts/ARLON BLACK.ttf'); font-weight: 900; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Century Gothic', sans-serif; background: #F5F5F2; padding: 24px; }
  .section-label { font-family: 'Arlon', sans-serif; font-weight: 900; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #6E7278; margin-bottom: 10px; }
  .stages { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .stage { border-radius: 6px; overflow: hidden; }
  .stage-bar { height: 6px; }
  .stage-body { padding: 10px 12px; }
  .stage-name { font-weight: 700; font-size: 12px; color: #121417; }
  .stage-swatches { display: flex; gap: 6px; margin-top: 8px; }
  .stage-swatch { width: 28px; height: 28px; border-radius: 4px; }
  .stage-hex { font-size: 10px; color: #6E7278; margin-top: 6px; font-family: monospace; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="section-label">Kanban Stage Colors</div>
  <div class="stages">
    <div class="stage" style="background:#FEF9E7;">
      <div class="stage-bar" style="background:#F5C842;"></div>
      <div class="stage-body">
        <div class="stage-name">Baby Idea</div>
        <div class="stage-swatches">
          <div class="stage-swatch" style="background:#F5C842;"></div>
          <div class="stage-swatch" style="background:#FEF9E7; border:1px solid #F5C842;"></div>
        </div>
        <div class="stage-hex">#F5C842</div>
      </div>
    </div>
    <div class="stage" style="background:#FDF0E9;">
      <div class="stage-bar" style="background:#E8845C;"></div>
      <div class="stage-body">
        <div class="stage-name">Guionizar</div>
        <div class="stage-swatches">
          <div class="stage-swatch" style="background:#E8845C;"></div>
          <div class="stage-swatch" style="background:#FDF0E9; border:1px solid #E8845C;"></div>
        </div>
        <div class="stage-hex">#E8845C</div>
      </div>
    </div>
    <div class="stage" style="background:#EAFAF3;">
      <div class="stage-bar" style="background:#52B788;"></div>
      <div class="stage-body">
        <div class="stage-name">Grabación</div>
        <div class="stage-swatches">
          <div class="stage-swatch" style="background:#52B788;"></div>
          <div class="stage-swatch" style="background:#EAFAF3; border:1px solid #52B788;"></div>
        </div>
        <div class="stage-hex">#52B788</div>
      </div>
    </div>
    <div class="stage" style="background:#EBF4FC;">
      <div class="stage-bar" style="background:#5B9BD5;"></div>
      <div class="stage-body">
        <div class="stage-name">Edición</div>
        <div class="stage-swatches">
          <div class="stage-swatch" style="background:#5B9BD5;"></div>
          <div class="stage-swatch" style="background:#EBF4FC; border:1px solid #5B9BD5;"></div>
        </div>
        <div class="stage-hex">#5B9BD5</div>
      </div>
    </div>
    <div class="stage" style="background:#F4EEFB;">
      <div class="stage-bar" style="background:#9B72CF;"></div>
      <div class="stage-body">
        <div class="stage-name">Publicado</div>
        <div class="stage-swatches">
          <div class="stage-swatch" style="background:#9B72CF;"></div>
          <div class="stage-swatch" style="background:#F4EEFB; border:1px solid #9B72CF;"></div>
        </div>
        <div class="stage-hex">#9B72CF</div>
      </div>
    </div>
  </div>

  <div class="section-label" style="margin-top:20px;">Badges in Context</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <span class="badge" style="background:#FEF9E7;color:#B8920E;">Baby Idea</span>
    <span class="badge" style="background:#FDF0E9;color:#C05A2C;">Guionizar</span>
    <span class="badge" style="background:#EAFAF3;color:#2D8A5E;">Grabación</span>
    <span class="badge" style="background:#EBF4FC;color:#2E6FA8;">Edición</span>
    <span class="badge" style="background:#F4EEFB;color:#6B3FA8;">Publicado</span>
    <span class="badge" style="background:#F0F1F2;color:#6E7278;">Pendiente</span>
    <span class="badge" style="background:#E5E6E8;color:#3D4147;">En Progreso</span>
    <span class="badge" style="background:#D0D3D8;color:#1C1F23;">Entregado</span>
  </div>
</body>
</html>
